version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: xis_user
      POSTGRES_PASSWORD: xis_123
      POSTGRES_DB: xis_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always

    # ✅ IMPORTANT: ensures DB is actually ready
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    depends_on:
      db:
        condition: service_healthy   # ✅ waits until Postgres is ready

    environment:
      SECRET_KEY: django-insecure-9x3#kL!8vP2zQ@7fR5mT1yU$eC0aWbHnK4dL8sJpX
      DEBUG: "True"
      DB_NAME: xis_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: "5432"

    ports:
      - "8000:8000"
    volumes:
      - .:/app
    restart: always

volumes:
  pgdata: